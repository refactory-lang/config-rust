# Reference Cargo workspace settings for refactory-lang Rust repos.
# Copy relevant sections into your repo's Cargo.toml.

[workspace.package]
edition = "2024"
rust-version = "1.85"
license = "Apache-2.0"
repository = "https://github.com/refactory-lang"

[workspace.lints.rust]
unsafe_code = "forbid"

[workspace.lints.clippy]
all = { level = "warn", priority = -1 }
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"

[profile.release]
lto = true
codegen-units = 1
strip = true
